displayName: Real-time Pipeline Metrics
gridLayout:
  columns: "2"
  widgets:
  - title: Pub/Sub Message Count
    xyChart:
      dataSets:
      - timeSeriesQuery:
          unit: "1"
          metricType: pubsub.googleapis.com/topic/message_count
          dataSource: metrics
        plotType: LINE
      timeshiftDuration: "0s"
      yAxis:
        scale: LINEAR
  - title: Pub/Sub Publish Requests
    xyChart:
      dataSets:
      - timeSeriesQuery:
          unit: "1"
          metricType: pubsub.googleapis.com/topic/publish_request_count
          dataSource: metrics
        plotType: LINE
      timeshiftDuration: "0s"
      yAxis:
        scale: LINEAR
