data_analysis:
  output_directory: data/analysis/
  visualizations:
    default_format: png
    dpi: 150
deep_learning:
  models_directory: models/deep_learning/
  training:
    batch_size: 32
    default_epochs: 10
    validation_split: 0.2
gesture_recognition:
  camera:
    device_id: 0
    resolution:
    - 640
    - 480
  detection:
    confidence_threshold: 0.5
    smoothing_window: 5
enterprise_ai:
  features:
    continuous_listening: false
    data_analysis: true
    gesture_control: true
    voice_commands: true
  llm_provider: mock
  voice:
    rate: 200
    volume: 0.9
llm:
  default_provider: mock
  mock:
    mock_response_delay: 0.1
logging:
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: INFO
machine_learning:
  cross_validation:
    folds: 3
  models_directory: models/sklearn/
