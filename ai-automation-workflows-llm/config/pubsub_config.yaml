# Pub/Sub Configuration for AI Automation Workflows

# Project Configuration
project_id: "${GCP_PROJECT_ID}"

# Pub/Sub Topics Configuration
topics:
  automation-events:
    name: "automation-events"
    description: "AI automation events and triggers"
    retention_period: "7d"
    message_retention_duration: "604800s"
    enable_message_ordering: false
    
  enterprise_ai-commands:
    name: "enterprise_ai-commands"
    description: "Enterprise AI voice command events"
    retention_period: "3d"
    message_retention_duration: "259200s"
    enable_message_ordering: true
    
  workflow-status:
    name: "workflow-status"
    description: "Workflow execution status updates"
    retention_period: "14d"
    message_retention_duration: "1209600s"
    enable_message_ordering: true

# Pub/Sub Subscriptions Configuration
subscriptions:
  automation-processor-sub:
    topic: "automation-events"
    name: "automation-processor-sub"
    ack_deadline_seconds: 60
    message_retention_duration: "600s"
    enable_message_ordering: false
    filter: ""
    
  enterprise_ai-handler-sub:
    topic: "enterprise_ai-commands"
    name: "enterprise_ai-handler-sub"
    ack_deadline_seconds: 30
    message_retention_duration: "300s"
    enable_message_ordering: true
    filter: "attributes.command_type IN ('voice', 'gesture', 'text')"
    
  workflow-monitor-sub:
    topic: "workflow-status"
    name: "workflow-monitor-sub"
    ack_deadline_seconds: 120
    message_retention_duration: "1800s"
    enable_message_ordering: true
    filter: "attributes.status IN ('started', 'completed', 'failed')"

# Dead Letter Policy Configuration
dead_letter_policies:
  automation-events-dlq:
    topic: "automation-events-dlq"
    max_delivery_attempts: 5
    
  enterprise_ai-commands-dlq:
    topic: "enterprise_ai-commands-dlq"
    max_delivery_attempts: 3

# Publisher Configuration
publishers:
  automation_trigger:
    topic: "automation-events"
    batch_size: 50
    max_latency: 0.1
    compression: "gzip"
    
  enterprise_ai_interface:
    topic: "enterprise_ai-commands"
    batch_size: 10
    max_latency: 0.05
    compression: "none"

# Message Schemas
message_schemas:
  automation_event:
    type: "json"
    fields:
      event_id: "string"
      event_type: "string"
      automation_type: "string"
      timestamp: "timestamp"
      user_id: "string"
      session_id: "string"
      data: "object"
      source_system: "string"
      processing_status: "string"
      
  enterprise_ai_command:
    type: "json"
    fields:
      command_id: "string"
      command_type: "string"
      command_text: "string"
      user_id: "string"
      timestamp: "timestamp"
      confidence: "float"
      metadata: "object"
      
  workflow_status:
    type: "json"
    fields:
      workflow_id: "string"
      workflow_name: "string"
      status: "string"
      timestamp: "timestamp"
      step: "string"
      progress: "float"
      error_message: "string"
      metadata: "object"

# Monitoring and Alerting
monitoring:
  metrics:
    - "pubsub.googleapis.com/topic/message_count"
    - "pubsub.googleapis.com/subscription/num_undelivered_messages"
    - "pubsub.googleapis.com/subscription/oldest_unacked_message_age"
    
  alerts:
    high_automation_backlog:
      metric: "pubsub.googleapis.com/subscription/num_undelivered_messages"
      threshold: 1000
      comparison: "greater_than"
      duration: "300s"
      
    enterprise_ai_command_delay:
      metric: "pubsub.googleapis.com/subscription/oldest_unacked_message_age"
      threshold: 60
      comparison: "greater_than"
      duration: "300s"

# Security Configuration
security:
  encryption:
    kms_key_name: "${KMS_KEY_NAME}"
    
  iam:
    publishers:
      - "serviceAccount:automation-service-account@${GCP_PROJECT_ID}.iam.gserviceaccount.com"
      - "serviceAccount:enterprise_ai-service-account@${GCP_PROJECT_ID}.iam.gserviceaccount.com"
      
    subscribers:
      - "serviceAccount:automation-service-account@${GCP_PROJECT_ID}.iam.gserviceaccount.com"
      - "serviceAccount:workflow-service-account@${GCP_PROJECT_ID}.iam.gserviceaccount.com"
